<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParcelAPP - Control Agrícola</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: { tierra: '#8B5A2B', pasto: '#4CAF50', cielo: '#87CEEB' }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #f4f6f8; color: #333; }
        .tarea-card { cursor: grab; }
        .tarea-card:active { cursor: grabbing; transform: scale(0.98); }
        .sortable-ghost { opacity: 0.4; background-color: #e2e8f0; border: 2px dashed #94a3b8; }
        .sortable-drag { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        /* Tareas Bloqueadas */
        .bloqueada { background-color: #fef2f2 !important; border-color: #fca5a5 !important; }
        .bloqueada p { color: #991b1b !important; }
        
        /* Tareas Completadas (El "Yaay") */
        .completada { background-color: #f0fdf4 !important; border-color: #bbf7d0 !important; opacity: 0.85; }
        .completada p { color: #64748b !important; text-decoration: line-through; }
        
        /* Ocultar barra de scroll en modales */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen relative">

    <div class="w-full max-w-6xl flex flex-col md:flex-row justify-between items-center gap-4 mb-8 bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
        <div>
            <h1 class="text-3xl font-extrabold text-tierra text-center md:text-left">ParcelAPP 🌱</h1>
            <p class="text-sm font-semibold text-gray-500 tracking-wider uppercase text-center md:text-left">Centro de Mando</p>
        </div>
        
        <div class="flex items-center gap-3 w-full md:w-auto justify-center">
            
            <div id="widget-clima" class="bg-blue-50 text-blue-600 px-3 py-3 rounded-xl font-bold flex items-center gap-2 border border-blue-100 shadow-sm min-w-[130px] justify-center transition-all">
                <span id="clima-temp" class="text-sm">⏳ Cargando</span>
                <span id="clima-desc" class="text-[10px] text-blue-400 border-l border-blue-200 pl-2 leading-tight uppercase">Olmué</span>
            </div>

            <button onclick="abrirModalInsumos()" class="bg-indigo-50 text-indigo-600 px-3 py-3 rounded-xl font-bold flex items-center gap-2 border border-indigo-100 hover:bg-indigo-100 transition shadow-sm">
                <span>🛒</span>
                <span id="count-insumos" class="bg-indigo-200 text-indigo-800 text-xs px-2 py-0.5 rounded-full font-black">0</span>
            </button>
            
            <button onclick="abrirModalCrear()" class="bg-tierra text-white px-5 py-3 rounded-xl font-black hover:bg-amber-800 transition shadow-md active:scale-95 flex items-center gap-2">
                <span>+ NUEVO</span>
            </button>
        </div>
    </div>

    <div class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-4 gap-4">
        
        <div class="bg-gray-100 p-4 rounded-2xl border border-gray-200 flex flex-col">
            <h2 class="font-bold text-gray-700 mb-4 flex justify-between items-center">
                📋 Por Asignar 
                <span id="count-pendientes" class="bg-gray-200 text-gray-600 text-xs px-2 py-1 rounded-full font-black">0</span>
            </h2>
            <div id="lista-pendientes" class="lista-tareas flex-1 min-h-[200px] space-y-3" data-asignado="pendientes">
                </div>
        </div>

        <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 flex flex-col relative overflow-hidden">
            <div class="flex items-center gap-3 mb-2 z-10 relative">
                <div class="w-10 h-10 bg-emerald-200 rounded-full flex items-center justify-center font-black text-emerald-700 text-lg shadow-inner">JG</div>
                <div class="flex-1">
                    <h2 class="font-bold text-emerald-800 leading-tight">Jorge</h2>
                    <div class="w-full mt-1">
                        <div class="flex justify-between text-[9px] font-black text-emerald-600 mb-0.5 uppercase tracking-wider">
                            <span>Rendimiento</span>
                            <span id="progreso-txt-jorge">0%</span>
                        </div>
                        <div class="w-full bg-emerald-200 h-1.5 rounded-full overflow-hidden">
                            <div id="progreso-bar-jorge" class="bg-emerald-500 h-full rounded-full w-0 transition-all duration-700"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="lista-jorge" class="lista-tareas flex-1 min-h-[200px] space-y-3 mt-2 z-10 relative" data-asignado="jorge"></div>
        </div>

        <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100 flex flex-col relative overflow-hidden">
            <div class="flex items-center gap-3 mb-2 z-10 relative">
                <div class="w-10 h-10 bg-amber-200 rounded-full flex items-center justify-center font-black text-amber-700 text-lg shadow-inner">JN</div>
                <div class="flex-1">
                    <h2 class="font-bold text-amber-800 leading-tight">Juan</h2>
                    <div class="w-full mt-1">
                        <div class="flex justify-between text-[9px] font-black text-amber-600 mb-0.5 uppercase tracking-wider">
                            <span>Rendimiento</span>
                            <span id="progreso-txt-juan">0%</span>
                        </div>
                        <div class="w-full bg-amber-200 h-1.5 rounded-full overflow-hidden">
                            <div id="progreso-bar-juan" class="bg-amber-500 h-full rounded-full w-0 transition-all duration-700"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="lista-juan" class="lista-tareas flex-1 min-h-[200px] space-y-3 mt-2 z-10 relative" data-asignado="juan"></div>
        </div>

        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex flex-col relative overflow-hidden">
            <div class="flex items-center gap-3 mb-2 z-10 relative">
                <div class="w-10 h-10 bg-blue-200 rounded-full flex items-center justify-center font-black text-blue-700 text-lg shadow-inner">JM</div>
                <div class="flex-1">
                    <h2 class="font-bold text-blue-800 leading-tight">Jaime</h2>
                    <div class="w-full mt-1">
                        <div class="flex justify-between text-[9px] font-black text-blue-600 mb-0.5 uppercase tracking-wider">
                            <span>Rendimiento</span>
                            <span id="progreso-txt-jaime">0%</span>
                        </div>
                        <div class="w-full bg-blue-200 h-1.5 rounded-full overflow-hidden">
                            <div id="progreso-bar-jaime" class="bg-blue-500 h-full rounded-full w-0 transition-all duration-700"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="lista-jaime" class="lista-tareas flex-1 min-h-[200px] space-y-3 mt-2 z-10 relative" data-asignado="jaime"></div>
        </div>

    </div>

    <div id="modal-crear" class="fixed inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm hidden flex items-start justify-center z-50 p-4 pt-20 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl transform scale-95 transition-transform duration-300" id="modal-crear-content">
            
            <div class="flex gap-2 bg-gray-100 p-1.5 rounded-2xl mb-6">
                <button onclick="switchTab('tarea')" id="tab-tarea" class="flex-1 bg-white shadow-sm rounded-xl py-2 font-black text-tierra transition-all">📋 TAREA</button>
                <button onclick="switchTab('insumo')" id="tab-insumo" class="flex-1 text-gray-500 font-bold py-2 rounded-xl transition-all">🛒 INSUMO</button>
            </div>

            <div id="form-tarea" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">¿Qué hay que hacer?</label>
                    <input type="text" id="input-tarea-texto" placeholder="Ej: Limpiar ionizador..." class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none focus:border-tierra focus:ring-1 focus:ring-tierra font-semibold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Frecuencia</label>
                    <select id="input-frecuencia" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none font-semibold text-gray-700">
                        <option value="Unica">📌 Única vez</option>
                        <option value="Diaria">🔄 Diaria</option>
                        <option value="Semanal">📅 Semanal</option>
                        <option value="Mensual">📆 Mensual</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-4 border-t border-gray-100">
                    <button onclick="cerrarModalCrear()" class="flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-200 transition">Cancelar</button>
                    <button id="btn-guardar-tarea" class="flex-1 bg-tierra text-white font-bold py-3 rounded-xl hover:bg-amber-800 transition shadow-lg">Añadir Tarea</button>
                </div>
            </div>

            <div id="form-insumo" class="space-y-4 hidden">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">¿Qué se necesita comprar?</label>
                    <input type="text" id="input-insumo-texto" placeholder="Ej: Bidón de Cloro 5L..." class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-semibold">
                </div>
                <div class="flex gap-3 pt-4 border-t border-gray-100">
                    <button onclick="cerrarModalCrear()" class="flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-200 transition">Cancelar</button>
                    <button id="btn-guardar-insumo" class="flex-1 bg-indigo-500 text-white font-bold py-3 rounded-xl hover:bg-indigo-600 transition shadow-lg">Añadir Insumo</button>
                </div>
            </div>

        </div>
    </div>

    <div id="modal-insumos" class="fixed inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl flex flex-col max-h-[80vh]" id="modal-insumos-content">
            <div class="flex justify-between items-center mb-4 pb-4 border-b border-gray-100">
                <h3 class="text-xl font-black text-indigo-600 flex items-center gap-2">🛒 Lista de Compras</h3>
                <button onclick="cerrarModalInsumos()" class="text-gray-400 hover:text-gray-700 bg-gray-100 w-8 h-8 rounded-full font-bold pb-1">x</button>
            </div>
            
            <ul id="lista-compras" class="space-y-2 overflow-y-auto no-scrollbar flex-1 pb-2">
                </ul>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, query, orderBy } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Credenciales oficiales
        const firebaseConfig = {
            apiKey: "AIzaSyBcMDgHeKsvfViSQW4u9VWX8BpgyLNUInI",
            authDomain: "parcelapp-3297c.firebaseapp.com",
            projectId: "parcelapp-3297c",
            storageBucket: "parcelapp-3297c.firebasestorage.app",
            messagingSenderId: "805959703160",
            appId: "1:805959703160:web:e045ea62902e33cbf56b8d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const tareasCol = collection(db, "tareas");
        const insumosCol = collection(db, "insumos");

        let tareasArray = [];
        let insumosArray = [];

        // --- CARGAR CLIMA REAL OLMUÉ ---
        async function cargarClimaOlmue() {
            try {
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-32.9945&longitude=-71.1824&current_weather=true");
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                
                let emoji = "☁️", desc = "Nublado";
                if(code === 0 || code === 1) { emoji = "☀️"; desc = "Despejado"; }
                else if(code === 2 || code === 3) { emoji = "⛅"; desc = "Parcial"; }
                else if(code >= 50 && code <= 69) { emoji = "🌧️"; desc = "Lluvia"; }
                
                document.getElementById('clima-temp').innerText = `${emoji} ${temp}°C`;
                document.getElementById('clima-desc').innerText = desc;
            } catch (error) {
                document.getElementById('clima-temp').innerText = `🌍 Olmué`;
                document.getElementById('clima-desc').innerText = `Sin red`;
            }
        }
        cargarClimaOlmue(); // Llamada inicial

        // --- CONTROL MODAL CREAR (TABS) ---
        window.abrirModalCrear = () => {
            const modal = document.getElementById('modal-crear');
            const content = document.getElementById('modal-crear-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
            document.getElementById('input-tarea-texto').focus();
        };

        window.cerrarModalCrear = () => {
            const modal = document.getElementById('modal-crear');
            const content = document.getElementById('modal-crear-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => { 
                modal.classList.add('hidden'); 
                document.getElementById('input-tarea-texto').value = '';
                document.getElementById('input-insumo-texto').value = '';
            }, 300);
        };

        window.switchTab = (tipo) => {
            const isTarea = tipo === 'tarea';
            document.getElementById('tab-tarea').className = isTarea 
                ? "flex-1 bg-white shadow-sm rounded-xl py-2 font-black text-tierra transition-all" 
                : "flex-1 text-gray-500 font-bold py-2 rounded-xl transition-all hover:bg-gray-200";
            
            document.getElementById('tab-insumo').className = !isTarea 
                ? "flex-1 bg-white shadow-sm rounded-xl py-2 font-black text-indigo-600 transition-all" 
                : "flex-1 text-gray-500 font-bold py-2 rounded-xl transition-all hover:bg-gray-200";

            document.getElementById('form-tarea').classList.toggle('hidden', !isTarea);
            document.getElementById('form-insumo').classList.toggle('hidden', isTarea);

            if(isTarea) document.getElementById('input-tarea-texto').focus();
            else document.getElementById('input-insumo-texto').focus();
        };

        // --- CONTROL MODAL INSUMOS ---
        window.abrirModalInsumos = () => {
            const modal = document.getElementById('modal-insumos');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); }, 10);
        };
        window.cerrarModalInsumos = () => {
            const modal = document.getElementById('modal-insumos');
            modal.classList.add('opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        };

        // --- RENDERIZAR TAREAS Y BARRAS DE PROGRESO ---
        function renderTareas() {
            document.getElementById('lista-pendientes').innerHTML = '';
            document.getElementById('lista-jorge').innerHTML = '';
            document.getElementById('lista-juan').innerHTML = '';
            document.getElementById('lista-jaime').innerHTML = '';

            let pendientesCount = 0;
            
            // Estadísticas para las barras
            let stats = {
                jorge: { total: 0, done: 0 },
                juan: { total: 0, done: 0 },
                jaime: { total: 0, done: 0 }
            };

            tareasArray.forEach(t => {
                const isDone = t.completada === true;
                
                // Contar para métricas
                if(t.asignado !== 'pendientes') {
                    stats[t.asignado].total++;
                    if(isDone) stats[t.asignado].done++;
                }

                const div = document.createElement('div');
                
                // Clases visuales base
                let baseClass = "tarea-card bg-white p-3 rounded-xl shadow-sm border flex flex-col gap-2 transition-all duration-300 relative overflow-hidden";
                
                // Combinar estados visuales
                if(isDone) {
                    baseClass += " completada border-l-4 border-l-green-400";
                } else if(t.bloqueada) {
                    baseClass += " bloqueada border-l-4 border-l-red-400";
                } else {
                    let borderClass = "border-l-4 border-gray-200 border-l-gray-400";
                    if(t.asignado === 'jorge') borderClass = "border-l-4 border-emerald-100 border-l-emerald-400";
                    if(t.asignado === 'juan') borderClass = "border-l-4 border-amber-100 border-l-amber-400";
                    if(t.asignado === 'jaime') borderClass = "border-l-4 border-blue-100 border-l-blue-400";
                    baseClass += " " + borderClass;
                }

                div.className = baseClass;
                div.dataset.id = t.id;

                let freqColor = "bg-gray-100 text-gray-500";
                if(t.frecuencia === 'Diaria') freqColor = "bg-blue-100 text-blue-600";
                if(t.frecuencia === 'Semanal') freqColor = "bg-purple-100 text-purple-600";
                if(t.frecuencia === 'Mensual') freqColor = "bg-orange-100 text-orange-600";

                // Botones Intermedios
                let actionButtons = "";
                
                if (isDone) {
                    // Estado positivo "Yaay"
                    actionButtons = `<button onclick="toggleCompletar('${t.id}', true)" class="text-[10px] font-black px-2 py-1 rounded-md bg-green-200 text-green-800 border border-green-300 active:scale-95 shadow-sm">✨ ¡LOGRADO!</button>`;
                } else {
                    // Estado Normal: Mostrar boton Completar + Boton Bloqueo
                    const btnBloqueo = t.bloqueada 
                        ? `<button onclick="toggleBloqueo('${t.id}', true)" class="text-[10px] flex items-center gap-1 font-black px-2 py-1 rounded-md bg-red-100 text-red-600 border border-red-200 active:scale-95 shadow-sm">🛑 BLOQUEADA</button>`
                        : `<button onclick="toggleBloqueo('${t.id}', false)" class="text-[10px] flex items-center gap-1 font-bold px-2 py-1 rounded-md bg-gray-50 text-gray-400 hover:bg-gray-200 hover:text-gray-600 active:scale-95 transition-colors">⚠️ Falta Insumo</button>`;
                    
                    const btnCompletar = `<button onclick="toggleCompletar('${t.id}', false)" class="text-[10px] flex items-center gap-1 font-bold px-2 py-1 rounded-md bg-emerald-50 text-emerald-600 border border-emerald-100 hover:bg-emerald-500 hover:text-white active:scale-95 transition-all shadow-sm">✅ Terminar</button>`;
                    
                    actionButtons = `<div class="flex gap-2">${btnBloqueo}${btnCompletar}</div>`;
                }

                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <p class="font-bold text-sm text-gray-800 leading-tight pr-2 select-none z-10">${t.texto}</p>
                        <button onclick="borrarTarea('${t.id}')" class="text-gray-300 hover:text-red-500 font-bold px-1 transition-colors z-10">×</button>
                    </div>
                    
                    <div class="flex justify-between items-center mt-1 pt-2 border-t ${t.bloqueada && !isDone ? 'border-red-100' : 'border-gray-100'} z-10">
                        <span class="text-[9px] font-black uppercase px-1.5 py-0.5 rounded ${freqColor}">
                            ${t.frecuencia}
                        </span>
                        ${actionButtons}
                    </div>
                `;

                document.getElementById(`lista-${t.asignado}`).appendChild(div);
                if(t.asignado === 'pendientes') pendientesCount++;
            });

            document.getElementById('count-pendientes').innerText = pendientesCount;

            // Renderizar barras de rendimiento
            ['jorge', 'juan', 'jaime'].forEach(trabajador => {
                const total = stats[trabajador].total;
                const done = stats[trabajador].done;
                const percent = total === 0 ? 0 : Math.round((done / total) * 100);
                
                document.getElementById(`progreso-txt-${trabajador}`).innerText = `${percent}%`;
                document.getElementById(`progreso-bar-${trabajador}`).style.width = `${percent}%`;
            });
        }

        // --- RENDERIZAR INSUMOS ---
        function renderInsumos() {
            const lista = document.getElementById('lista-compras');
            lista.innerHTML = '';
            
            const pendientes = insumosArray.filter(i => !i.comprado).length;
            document.getElementById('count-insumos').innerText = pendientes;
            
            if(insumosArray.length === 0) {
                lista.innerHTML = `<p class="text-center text-sm text-gray-400 italic mt-4">No hay insumos pendientes.</p>`;
                return;
            }

            const sorted = insumosArray.sort((a, b) => (a.comprado === b.comprado) ? 0 : a.comprado ? 1 : -1);

            sorted.forEach(insumo => {
                const li = document.createElement('li');
                li.className = `flex justify-between items-center p-3 rounded-xl border ${insumo.comprado ? 'bg-gray-50 border-gray-100 opacity-60' : 'bg-white border-gray-200 shadow-sm'}`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${insumo.comprado ? 'checked' : ''} onclick="toggleInsumo('${insumo.id}', ${insumo.comprado})" class="w-5 h-5 accent-indigo-500 rounded cursor-pointer">
                        <span class="text-sm font-bold ${insumo.comprado ? 'text-gray-400 line-through' : 'text-gray-700'}">${insumo.texto}</span>
                    </div>
                    <button onclick="borrarInsumo('${insumo.id}')" class="text-gray-300 hover:text-red-500 font-bold px-2 text-xl pb-1">×</button>
                `;
                lista.appendChild(li);
            });
        }

        // --- ESCUCHAS FIREBASE ---
        onSnapshot(query(tareasCol, orderBy("fecha", "desc")), (snap) => {
            tareasArray = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTareas();
        });

        onSnapshot(query(insumosCol, orderBy("fecha", "desc")), (snap) => {
            insumosArray = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderInsumos();
        });

        // --- ACCIONES TAREAS ---
        document.getElementById('btn-guardar-tarea').onclick = async () => {
            const texto = document.getElementById('input-tarea-texto').value;
            if (!texto.trim()) return;
            try {
                await addDoc(tareasCol, {
                    texto: texto, frecuencia: document.getElementById('input-frecuencia').value,
                    asignado: 'pendientes', bloqueada: false, completada: false, fecha: Date.now()
                });
                cerrarModalCrear();
            } catch (error) { alert("Error: " + error.message); }
        };

        window.borrarTarea = async (id) => {
            if(confirm("¿Eliminar tarea definitivamente?")) await deleteDoc(doc(db, "tareas", id));
        };

        window.toggleBloqueo = async (id, estadoActual) => {
            await updateDoc(doc(db, "tareas", id), { bloqueada: !estadoActual });
        };

        window.toggleCompletar = async (id, estadoActual) => {
            if (!estadoActual) {
                // ¡Disparar confeti si la está completando!
                confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 }, colors: ['#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B'] });
            }
            await updateDoc(doc(db, "tareas", id), { completada: !estadoActual, bloqueada: false }); // Desbloquear si se completa
        };

        // --- ACCIONES INSUMOS ---
        document.getElementById('btn-guardar-insumo').onclick = async () => {
            const texto = document.getElementById('input-insumo-texto').value;
            if (!texto.trim()) return;
            try {
                await addDoc(insumosCol, { texto: texto, comprado: false, fecha: Date.now() });
                cerrarModalCrear();
                abrirModalInsumos();
            } catch (error) { alert("Error: " + error.message); }
        };

        window.toggleInsumo = async (id, estadoActual) => {
            await updateDoc(doc(db, "insumos", id), { comprado: !estadoActual });
        };

        window.borrarInsumo = async (id) => {
            await deleteDoc(doc(db, "insumos", id));
        };

        // --- DRAG AND DROP ---
        const initSortable = (idLista) => {
            new Sortable(document.getElementById(idLista), {
                group: 'tareas', animation: 150, ghostClass: 'sortable-ghost',
                onEnd: async function (evt) {
                    const idTarea = evt.item.dataset.id;
                    const nuevoAsignado = evt.to.dataset.asignado;
                    try { await updateDoc(doc(db, "tareas", idTarea), { asignado: nuevoAsignado }); } 
                    catch (error) { renderTareas(); }
                }
            });
        };

        initSortable('lista-pendientes');
        initSortable('lista-jorge');
        initSortable('lista-juan');
        initSortable('lista-jaime');
    </script>
</body>
</html>
