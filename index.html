<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParcelAPP - Control Agrícola</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: {
                        tierra: '#8B5A2B',
                        pasto: '#4CAF50',
                        cielo: '#87CEEB'
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #f4f6f8; color: #333; }
        .tarea-card { cursor: grab; }
        .tarea-card:active { cursor: grabbing; transform: scale(0.98); }
        /* Efecto al arrastrar */
        .sortable-ghost { opacity: 0.4; background-color: #e2e8f0; }
        .sortable-drag { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-4xl flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
        <div>
            <h1 class="text-3xl font-extrabold text-tierra">ParcelAPP 🌱</h1>
            <p class="text-sm font-semibold text-gray-500 tracking-wider uppercase">Centro de Mando</p>
        </div>
        <div class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold flex items-center gap-2 border border-blue-100">
            <span>☀️ 24°C</span>
            <span class="text-xs text-blue-400 border-l border-blue-200 pl-2">Despejado</span>
        </div>
    </div>

    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-4 gap-4">
        
        <div class="bg-gray-100 p-4 rounded-2xl border border-gray-200 flex flex-col">
            <h2 class="font-bold text-gray-700 mb-4 flex justify-between items-center">
                📋 Por Asignar 
                <span class="bg-gray-200 text-gray-600 text-xs px-2 py-1 rounded-full">3</span>
            </h2>
            <div id="lista-pendientes" class="lista-tareas flex-1 min-h-[200px] space-y-3">
                <div class="tarea-card bg-white p-3 rounded-xl shadow-sm border border-gray-200 border-l-4 border-l-gray-400">
                    <p class="font-bold text-sm">Fumigar cuartel norte</p>
                    <div class="flex gap-1 mt-2">
                        <span class="text-[10px] bg-red-100 text-red-600 font-bold px-2 py-0.5 rounded-md">🛑 Falta Insumo</span>
                    </div>
                </div>
                
                <div class="tarea-card bg-white p-3 rounded-xl shadow-sm border border-gray-200 border-l-4 border-l-gray-400">
                    <p class="font-bold text-sm">Revisar bomba de agua</p>
                </div>
            </div>
            <button class="mt-4 w-full bg-gray-200 text-gray-600 font-bold py-2 rounded-xl hover:bg-gray-300 transition text-sm">+ Nueva Tarea</button>
        </div>

        <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 flex flex-col">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-emerald-200 rounded-full flex items-center justify-center font-black text-emerald-600 text-lg">JG</div>
                <div>
                    <h2 class="font-bold text-emerald-800 leading-tight">Jorge</h2>
                    <div class="w-full bg-emerald-200 h-1.5 rounded-full mt-1">
                        <div class="bg-emerald-500 h-1.5 rounded-full w-[60%]"></div>
                    </div>
                </div>
            </div>
            <div id="lista-jorge" class="lista-tareas flex-1 min-h-[200px] space-y-3">
                <div class="tarea-card bg-white p-3 rounded-xl shadow-sm border border-gray-200 border-l-4 border-l-emerald-400">
                    <p class="font-bold text-sm">Limpiar canales</p>
                </div>
            </div>
        </div>

        <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100 flex flex-col">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-amber-200 rounded-full flex items-center justify-center font-black text-amber-600 text-lg">JN</div>
                <div>
                    <h2 class="font-bold text-amber-800 leading-tight">Juan</h2>
                    <div class="w-full bg-amber-200 h-1.5 rounded-full mt-1">
                        <div class="bg-amber-500 h-1.5 rounded-full w-[30%]"></div>
                    </div>
                </div>
            </div>
            <div id="lista-juan" class="lista-tareas flex-1 min-h-[200px] space-y-3">
                </div>
        </div>

        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex flex-col">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-blue-200 rounded-full flex items-center justify-center font-black text-blue-600 text-lg">JM</div>
                <div>
                    <h2 class="font-bold text-blue-800 leading-tight">Jaime</h2>
                    <div class="w-full bg-blue-200 h-1.5 rounded-full mt-1">
                        <div class="bg-blue-500 h-1.5 rounded-full w-[90%]"></div>
                    </div>
                </div>
            </div>
            <div id="lista-jaime" class="lista-tareas flex-1 min-h-[200px] space-y-3">
                 <div class="tarea-card bg-white p-3 rounded-xl shadow-sm border border-gray-200 border-l-4 border-l-blue-400">
                    <p class="font-bold text-sm">Reparar tractor</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Inicializar Drag and Drop conectando todas las listas
        const opcionesSortable = {
            group: 'tareas', // Esto permite mover items entre diferentes listas
            animation: 150,
            ghostClass: 'sortable-ghost',
            onEnd: function (evt) {
                // Aquí en el futuro capturaremos a dónde se movió la tarea para actualizar Firebase
                console.log(`Tarea movida a: ${evt.to.id}`);
            }
        };

        new Sortable(document.getElementById('lista-pendientes'), opcionesSortable);
        new Sortable(document.getElementById('lista-jorge'), opcionesSortable);
        new Sortable(document.getElementById('lista-juan'), opcionesSortable);
        new Sortable(document.getElementById('lista-jaime'), opcionesSortable);
    </script>
</body>
</html>
